<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>智语导师</title>
    <link rel="stylesheet" href="./styles.css?v=20260523-free32" />
  </head>
  <body>
    <main class="app-shell">
      <header class="top-bar">
        <div>
          <p class="eyebrow" id="pageEyebrow">Sentence Reader</p>
          <h1 id="pageTitle">句读</h1>
        </div>
        <button class="account-button" id="accountButton" type="button" aria-label="登录账号" title="登录账号">登</button>
        <button class="icon-button" id="clearButton" type="button" aria-label="清空内容" title="清空">
          <span aria-hidden="true">×</span>
        </button>
      </header>

      <section class="page-view is-active" id="sentencesPage" aria-label="句子学习">
        <section class="view-panel" aria-label="句子分类">
          <div class="view-tabs" role="tablist" aria-label="句子分类">
            <button class="view-tab is-active" id="learningTab" type="button" role="tab" aria-selected="true">学习中</button>
            <button class="view-tab" id="learnedTab" type="button" role="tab" aria-selected="false">已学会</button>
          </div>
          <p id="sentenceCount">0 句</p>
          <label class="voice-picker">
            <span>语速</span>
            <input id="speedSlider" type="range" min="0.5" max="1.5" step="0.05" value="1" aria-label="调整朗读语速" />
            <strong id="speedValue">1.00x</strong>
          </label>
        </section>

        <section class="review-panel" aria-label="句子复习">
          <div>
            <p class="eyebrow">Review</p>
            <h2>复习当前句子</h2>
          </div>
          <button class="ghost-button" id="reviewButton" type="button">开始默写</button>
        </section>

        <section class="input-panel" aria-label="添加英文句子">
          <textarea
            id="sentenceInput"
            placeholder="输入或粘贴要添加的英文句子..."
            autocomplete="off"
            spellcheck="false"
          ></textarea>
          <div class="input-actions">
            <button class="primary-button" id="addButton" type="button">添加</button>
          </div>
        </section>

        <section class="sentence-list" id="sentenceList" aria-live="polite"></section>

        <section class="empty-state" id="emptyState">
          <h2>添加句子后就能直接听</h2>
          <p>整句点右侧按钮，单词直接点英文。</p>
        </section>
      </section>

      <section class="page-view exam-page" id="examPage" aria-label="句子考试">
        <section class="exam-hero">
          <p class="eyebrow">Sentence Quiz</p>
          <h2>句子默写考试</h2>
          <p id="examProgress">准备中</p>
        </section>

        <section class="exam-card" aria-label="默写题目">
          <p class="sheet-label">中文句意</p>
          <h2 id="examPrompt">先添加学习中的句子和中文句意</h2>
          <textarea
            id="examAnswer"
            placeholder="输入完整英文句子..."
            autocomplete="off"
            spellcheck="false"
          ></textarea>
          <div class="exam-actions">
            <button class="primary-button" id="examCheckButton" type="button">检查</button>
            <button class="ghost-button" id="examDontKnowButton" type="button">我不会</button>
          </div>
          <div class="exam-feedback" id="examFeedback" aria-live="polite"></div>
          <div class="exam-answer-panel" id="examAnswerPanel" aria-live="polite"></div>
          <button class="ghost-button" id="examNextButton" type="button">下一题</button>
        </section>
      </section>

      <section class="page-view scenes-page" id="scenesPage" aria-label="场景学习">
        <section class="scenes-panel">
          <div class="scenes-header">
            <div>
              <p class="eyebrow">Daily Scenes</p>
              <h2>场景学习</h2>
            </div>
          </div>
          <div class="scene-group-tabs" id="sceneGroupTabs" aria-label="场景分类"></div>
          <div class="scene-list" id="sceneList" aria-live="polite"></div>
          <article class="scene-detail" id="sceneDetail" hidden aria-live="polite"></article>
        </section>
      </section>

      <section class="page-view teacher-page" id="teacherPage" aria-label="智语导师">
        <section class="chat-panel" aria-label="智语导师聊天">
          <div class="chat-messages" id="chatMessages" aria-live="polite"></div>
          <div class="quick-prompts" aria-label="快捷问题">
            <button type="button" id="topicButton" data-topic="start">话题</button>
            <button type="button" data-prompt="给我3句适合日常聊天的英文句子。">日常口语句子</button>
            <button type="button" id="freeChatButton" data-free-chat="start">闲聊模式</button>
          </div>
          <div class="chat-composer">
            <textarea
              class="teacher-input"
              id="teacherInput"
              placeholder="问智语导师，比如：给我几句适合旅行时使用的英文句子..."
              rows="1"
              enterkeyhint="send"
              autocomplete="off"
              spellcheck="false"
            ></textarea>
          </div>
        </section>
      </section>

      <section class="page-view friends-page" id="friendsPage" aria-label="好友">
        <section class="friends-panel">
          <div class="friends-header">
            <p class="eyebrow">Community</p>
            <h2>好友</h2>
            <button class="ghost-button" id="refreshFriendsButton" type="button">刷新</button>
          </div>
          <div class="friend-list" id="friendList" aria-live="polite"></div>
        </section>
      </section>
    </main>

    <nav class="bottom-nav" aria-label="页面切换">
      <button class="bottom-nav-button is-active" id="sentencesNav" type="button" aria-current="page">句子</button>
      <button class="bottom-nav-button" id="scenesNav" type="button">场景</button>
      <button class="bottom-nav-button" id="teacherNav" type="button">智语导师</button>
      <button class="bottom-nav-button" id="friendsNav" type="button">好友</button>
    </nav>

    <aside class="word-sheet" id="wordSheet" aria-live="polite" aria-label="单词释义">
      <div class="sheet-handle"></div>
      <div class="word-main">
        <div>
          <p class="sheet-label">Word</p>
          <h2 id="selectedWord">word</h2>
          <p id="phoneticText"></p>
        </div>
        <button class="round-button" id="wordSpeakButton" type="button" aria-label="朗读单词" title="朗读单词">
          <span aria-hidden="true">▶</span>
        </button>
      </div>
      <p class="meaning" id="meaningText"></p>
    </aside>

    <section class="update-sheet" id="updateSheet" hidden>
      <div class="update-card" role="dialog" aria-modal="true" aria-labelledby="updateVersionText">
        <p class="update-kicker">App Update</p>
        <h2 id="updateVersionText">发现新版本</h2>
        <p id="updateNotesText">新版本已经准备好。</p>
        <div class="update-actions">
          <button class="ghost-button" id="updateLaterButton" type="button">稍后</button>
          <button class="primary-button" id="updateNowButton" type="button">立即更新</button>
        </div>
      </div>
    </section>

    <section class="auth-sheet" id="authSheet" hidden>
      <div class="auth-card" role="dialog" aria-modal="true" aria-labelledby="authTitle">
        <p class="auth-kicker">Account</p>
        <h2 id="authTitle">登录账号</h2>
        <p id="authStatusText">登录后会同步你的句子、学习状态和导师聊天记录。</p>
        <section class="account-profile" id="accountProfile" hidden>
          <button class="account-avatar-large" id="authAvatarButton" type="button" aria-label="更改头像" title="更改头像">登</button>
          <input id="authAvatarFile" type="file" accept="image/*" hidden />
          <div>
            <strong id="authProfileName">未登录</strong>
            <span id="authProfileEmail">登录后同步学习内容</span>
          </div>
        </section>
        <button class="ghost-button" id="editProfileButton" type="button" hidden>修改头像和名称</button>
        <section class="profile-editor" id="profileEditor" hidden>
          <input class="auth-input" id="profileNameInput" type="text" placeholder="新的昵称" autocomplete="name" />
          <button class="primary-button" id="saveProfileButton" type="button">保存资料</button>
        </section>
        <section class="account-settings" id="accountSettings" hidden>
          <p class="settings-title">学习语言</p>
          <div class="language-options" id="languageOptions" aria-label="切换学习语言"></div>
        </section>
        <input class="auth-input" id="authName" type="text" placeholder="昵称" autocomplete="name" hidden />
        <input class="auth-input" id="authEmail" type="email" placeholder="邮箱" autocomplete="email" />
        <input class="auth-input" id="authPassword" type="password" placeholder="密码，至少 6 位" autocomplete="current-password" />
        <button class="primary-button" id="authSubmitButton" type="button">登录</button>
        <button class="ghost-button" id="authModeButton" type="button">还没有账号？注册</button>
        <button class="ghost-button" id="authLogoutButton" type="button" hidden>退出登录</button>
        <button class="ghost-button" id="authCancelButton" type="button">稍后</button>
      </div>
    </section>

    <script src="./config.js?v=20260523-free32"></script>
    <script src="./app.js?v=20260523-free32"></script>
  </body>
</html>
